version: '3.8'
services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
      PGSSLMODE: disable  # Fix SSL crash
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 5

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0
    environment:
      POSTGRESDB: nakama
      POSTGRESPASSWORD: localdb
    command: 
      - sh
      - -c
      - |
        mkdir -p /tmp/modules &&
        echo "$$MAIN_JS_B64" | base64 -d > /tmp/modules/main.js &&
        nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec nakama --name nakama1 \
          --database.address postgres:localdb@postgres:5432/nakama \
          --socket.port 7350 \
          --console.port 7351 \
          --http.port 7349 \
          --runtime.path /tmp/modules \
          --runtime.js_entrypoint main.js
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"

volumes:
  pgdata:
